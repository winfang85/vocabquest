<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Quest Arcade</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #38bdf8;
            --accent-green: #4ade80;
            --accent-red: #f87171;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .game-container {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .badge {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-blue);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 6px 16px;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: inline-block;
            margin-bottom: 16px;
        }

        .word {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin: 10px 0 24px 0;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border-radius: 14px;
            padding: 16px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            line-height: 1.4;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .correct {
            background: rgba(74, 222, 128, 0.15) !important;
            border-color: var(--accent-green) !important;
            color: var(--accent-green) !important;
            font-weight: 600;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.1);
        }

        .wrong {
            background: rgba(248, 113, 113, 0.15) !important;
            border-color: var(--accent-red) !important;
            color: var(--accent-red) !important;
            box-shadow: 0 0 15px rgba(248, 113, 113, 0.1);
        }

        .score-board {
            margin-top: 28px;
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .score-num {
            color: var(--accent-blue);
            font-size: 1.1rem;
            font-weight: 700;
        }

        .unlock-btn {
            margin-top: 20px;
            background: linear-gradient(135deg, #ecc94b 0%, #d69e2e 100%);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 0 20px rgba(236, 201, 75, 0.4);
            animation: pulse 1.5s infinite;
            display: none;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(236, 201, 75, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 0 30px rgba(236, 201, 75, 0.7); }
